name: Scripts Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 🛠️ Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          # Instalamos apache-airflow para validar que los imports de tus DAGs funcionen
          pip install flake8 sqlfluff apache-airflow

      - name: 🔍 Validar Scripts de Spark
        run: |
          flake8 spark/ --count --select=E9,F63,F7,F82 --show-source --statistics
          python -m compileall spark/

      - name: 🌬️ Validar DAGs de Airflow
        run: |
          # Verificamos sintaxis y errores de importación en la carpeta de dags
          flake8 airflow/ --count --select=E9,F63,F7,F82 --show-source --statistics
          python -m compileall airflow/

      - name: 🗄️ Validar Consultas de Athena
        run: |
          # Validamos archivos .sql en la carpeta aws_athena/
          sqlfluff lint aws_athena/ --dialect athena --exclude-rules LT01,LT02,LT05,LT08,LT09,ST01,CP01
